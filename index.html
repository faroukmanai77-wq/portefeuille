<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portefeuille Famille — Tableau de bord</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0b1220; --panel:#111a2e; --panel2:#0f1830; --border:#22304d;
    --text:#e7ecf7; --muted:#8fa0c0; --accent:#3ea6ff; --green:#2ecc8f; --red:#ff5d6c;
    --amber:#ffb454;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  .app{display:flex;min-height:100vh;}
  .sidebar{width:230px;flex:0 0 230px;background:var(--panel2);border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .brand{font-size:15px;font-weight:700;letter-spacing:.3px;margin-bottom:4px;}
  .brand small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:2px;}
  nav{margin-top:22px;display:flex;flex-direction:column;gap:2px;}
  nav button{
    all:unset;cursor:pointer;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:13.5px;font-weight:500;
  }
  nav button:hover{background:#182444;color:var(--text);}
  nav button.active{background:linear-gradient(135deg,#1c2c52,#182444);color:#fff;box-shadow:inset 0 0 0 1px var(--border);}
  .sidebar-foot{margin-top:20px;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
  .sidebar-foot button{all:unset;cursor:pointer;font-size:12px;color:var(--muted);padding:7px 10px;border-radius:8px;border:1px solid var(--border);text-align:center;}
  .sidebar-foot button:hover{color:#fff;border-color:#3a4d78;}
  .sidebar-foot input{width:100%;margin-bottom:6px;background:#0c1428;border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 8px;font-size:12px;}
  .sidebar-foot label{font-size:10.5px;color:var(--muted);display:block;margin-bottom:2px;}
  .main{flex:1;padding:26px 34px;max-width:1300px;}
  h1{font-size:22px;margin:0 0 4px;}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:22px;}
  .tab{display:none;}
  .tab.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
  .card .label{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .card .value{font-size:21px;font-weight:700;}
  .card .sub{font-size:12px;margin-top:4px;color:var(--muted);}
  .pos{color:var(--green)!important;} .neg{color:var(--red)!important;}
  .grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-bottom:22px;}
  @media(max-width:980px){.grid2{grid-template-columns:1fr;}}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px;}
  .panel h2{font-size:15px;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .panel h2 .actions{display:flex;gap:8px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;padding:8px 8px;border-bottom:1px solid var(--border);}
  td{padding:6px 8px;border-bottom:1px solid #1a2540;vertical-align:middle;}
  tr.total-row td{border-top:1px solid var(--border);border-bottom:none;font-weight:700;padding-top:10px;}
  input[type=text],input[type=number],input[type=date],input[type=password]{
    background:#0c1428;border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 8px;font-size:13px;width:100%;
  }
  input[type=number]{text-align:right;}
  input:focus{outline:none;border-color:var(--accent);}
  .num{text-align:right;}
  .computed{color:var(--accent);font-variant-numeric:tabular-nums;}
  .muted{color:var(--muted);}
  .btn{all:unset;cursor:pointer;background:#182444;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:12.5px;}
  .btn:hover{border-color:var(--accent);color:#fff;}
  .btn.small{padding:4px 9px;font-size:11.5px;}
  .btn.danger:hover{border-color:var(--red);color:var(--red);}
  select{background:#0c1428;border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 8px;font-size:13px;}
  .row-actions{white-space:nowrap;}
  .chart-wrap{position:relative;height:260px;}
  .save-indicator{position:fixed;bottom:16px;right:20px;background:#122040;border:1px solid var(--border);color:var(--muted);font-size:11.5px;padding:7px 12px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;}
  .save-indicator.show{opacity:1;}
  .pill{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:20px;background:#182444;color:var(--muted);}
  .pill.auto{color:var(--accent);}
  .checkbox{transform:scale(1.1);accent-color:var(--accent);}
  ::placeholder{color:#4c5c80;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">Famille — Finances<small>site personnel &middot; hébergé sur GitHub</small></div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">
      <div id="githubSection"></div>
    </div>
    <div class="sidebar-foot">
      <button id="btnExport">⭳ Exporter (sauvegarde)</button>
      <button id="btnImport">⭱ Importer une sauvegarde</button>
      <button id="btnReset">↺ Réinitialiser aux valeurs du fichier</button>
      <input type="file" id="fileImport" accept="application/json" style="display:none">
    </div>
  </div>
  <div class="main">
    <div id="tabs"></div>
  </div>
</div>
<div class="save-indicator" id="saveIndicator">✓ Sauvegardé</div>

<script>
/* =========================================================
   FORMATTERS
========================================================= */
const fmtCAD = n => (n===null||n===undefined||isNaN(n)) ? '—' : n.toLocaleString('fr-CA',{style:'currency',currency:'CAD',maximumFractionDigits:2});
const fmtNum = (n,d=2) => (n===null||n===undefined||isNaN(n)) ? '—' : n.toLocaleString('fr-CA',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct = n => (n===null||n===undefined||isNaN(n)) ? '—' : (n*100).toLocaleString('fr-CA',{minimumFractionDigits:1,maximumFractionDigits:1})+' %';
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* =========================================================
   DONNÉES DE SECOURS (utilisées seulement si data.json est inaccessible,
   par ex. si le fichier est ouvert en local avec un double-clic plutôt
   que via l'adresse du site hébergé)
========================================================= */
function defaultState(){
  return {
    positions: [], fundOrder: [], funds: {}, dividends: [],
    budget: { revenus: [], depenses: [], epargnes: [], cotisations: [] },
    bilan: { dettes: [], autresActifs: 0 },
    margin: [], projection2030: [],
  };
}

/* =========================================================
   ÉTAT + PERSISTANCE
   Source de vérité : data.json + prices.json dans le dépôt GitHub.
   - Au chargement : on lit d'abord le cache local (localStorage) pour un
     affichage instantané, puis on va chercher data.json/prices.json (même
     origine, servis par GitHub Pages) pour avoir la version la plus fraîche.
   - À chaque modification : on sauvegarde dans le cache local ET, si un
     token GitHub est configuré, on pousse data.json vers le dépôt (avec un
     léger délai pour grouper les frappes rapides).
========================================================= */
const STORE_KEY = 'famPortfolioDashboard_gh_v1';
const GH_KEY = 'famPortfolioGitHubConfig_v1';
let state = defaultState();
let gh = loadGitHubConfig(); // {owner, repo, branch, token}
let dataSha = null; // sha du data.json connu côté GitHub, pour les mises à jour

function loadLocalCache(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}
function loadGitHubConfig(){
  try{
    const raw = localStorage.getItem(GH_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {owner:'', repo:'', branch:'main', token:''};
}
function saveGitHubConfig(){
  localStorage.setItem(GH_KEY, JSON.stringify(gh));
}

let saveTimer=null;
let pushTimer=null;
function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>el.classList.remove('show'), 900);
  if(gh.owner && gh.repo && gh.token){
    clearTimeout(pushTimer);
    setSyncStatus('pending', 'Modifications en attente…');
    pushTimer = setTimeout(()=>pushStateToGitHub(), 1800);
  }
}

/* ---- Encodage UTF-8 <-> Base64 (pour l'API GitHub) ---- */
function utf8ToBase64(str){
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}
function base64ToUtf8(b64){
  const binary = atob(b64.replace(/\n/g,''));
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

/* ---- API GitHub Contents ---- */
function ghApiUrl(path){
  return `https://api.github.com/repos/${encodeURIComponent(gh.owner)}/${encodeURIComponent(gh.repo)}/contents/${path}`;
}
async function fetchDataShaAndContent(){
  const res = await fetch(ghApiUrl('data.json')+`?ref=${encodeURIComponent(gh.branch||'main')}`, {
    headers: { 'Authorization':`Bearer ${gh.token}`, 'Accept':'application/vnd.github+json' }
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const json = await res.json();
  return {sha: json.sha, content: base64ToUtf8(json.content)};
}
async function pushStateToGitHub(){
  if(!(gh.owner && gh.repo && gh.token)) return;
  setSyncStatus('saving', 'Enregistrement sur GitHub…');
  try{
    if(!dataSha){
      try{
        const current = await fetchDataShaAndContent();
        dataSha = current.sha;
      }catch(e){ /* fichier peut-être inexistant encore : on le crée */ }
    }
    const body = {
      message: `Mise à jour depuis le tableau de bord — ${new Date().toISOString()}`,
      content: utf8ToBase64(JSON.stringify(state, null, 2)),
      branch: gh.branch || 'main',
    };
    if(dataSha) body.sha = dataSha;
    const res = await fetch(ghApiUrl('data.json'), {
      method:'PUT',
      headers:{ 'Authorization':`Bearer ${gh.token}`, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    if(res.status===409){
      // conflit de version : on récupère le sha le plus récent et on réessaie une fois
      const current = await fetchDataShaAndContent();
      dataSha = current.sha;
      const retryBody = {...body, sha: dataSha};
      const retryRes = await fetch(ghApiUrl('data.json'), {
        method:'PUT',
        headers:{ 'Authorization':`Bearer ${gh.token}`, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
        body: JSON.stringify(retryBody)
      });
      if(!retryRes.ok) throw new Error('HTTP '+retryRes.status);
      const j = await retryRes.json();
      dataSha = j.content.sha;
    } else if(!res.ok){
      throw new Error('HTTP '+res.status);
    } else {
      const j = await res.json();
      dataSha = j.content.sha;
    }
    setSyncStatus('connected', 'Enregistré sur GitHub ✓');
  }catch(e){
    setSyncStatus('error', 'Erreur d’enregistrement : '+e.message);
  }
}
async function pullStateFromGitHub(){
  const current = await fetchDataShaAndContent();
  dataSha = current.sha;
  return JSON.parse(current.content);
}

/* =========================================================
   CALCULS PORTEFEUILLE
========================================================= */
function fundAggregate(symbol){
  const pos = state.positions.filter(p=>p.symbol===symbol);
  const shares = pos.reduce((s,p)=>s+(Number(p.shares)||0),0);
  const bookTotal = pos.reduce((s,p)=>s+((Number(p.shares)||0)*(Number(p.bookPrice)||0)),0);
  const bookPriceAvg = shares? bookTotal/shares : 0;
  const meta = state.funds[symbol] || {name:symbol,priceNow:0,annualDividend:0,priceATH:0};
  const priceNow = Number(meta.priceNow)||0;
  const currentValue = shares*priceNow;
  const profit = currentValue - bookTotal;
  const totalReturn = bookTotal ? profit/bookTotal : 0;
  const annualIncome = shares*(Number(meta.annualDividend)||0);
  const monthlyIncome = annualIncome/12;
  const yieldPct = priceNow? (Number(meta.annualDividend)||0)/priceNow : 0;
  const athValue = shares*(Number(meta.priceATH)||0);
  return {symbol, name:meta.name, shares, bookPriceAvg, bookTotal, priceNow, currentValue, profit, totalReturn, annualIncome, monthlyIncome, yieldPct, athValue, lastUpdated:meta.lastUpdated};
}
function allFundAggregates(){
  return state.fundOrder.map(fundAggregate).filter(f=>f.shares>0 || state.funds[f.symbol]);
}
function portfolioTotals(){
  const aggs = allFundAggregates();
  const totalInvested = aggs.reduce((s,f)=>s+f.bookTotal,0);
  const currentValue = aggs.reduce((s,f)=>s+f.currentValue,0);
  const profit = currentValue-totalInvested;
  const totalReturn = totalInvested? profit/totalInvested : 0;
  const annualIncome = aggs.reduce((s,f)=>s+f.annualIncome,0);
  return {totalInvested, currentValue, profit, totalReturn, annualIncome, monthlyIncome:annualIncome/12};
}

/* =========================================================
   CALCULS BUDGET
========================================================= */
function revenusTotal(){
  return state.budget.revenus.reduce((s,r)=>{
    const a = Number(r.amount)||0;
    if(r.type==='deduction') return s-a;
    if(r.type==='excluded') return s;
    return s+a;
  },0);
}
function depenseCategorieTotal(cat){
  if(cat.subs && cat.subs.length) return cat.subs.reduce((s,x)=>s+(Number(x.amount)||0),0);
  return Number(cat.amount)||0;
}
function depensesTotal(){
  return state.budget.depenses.reduce((s,c)=>c.excluded? s : s+depenseCategorieTotal(c),0);
}
function epargnesTotal(){
  return state.budget.epargnes.reduce((s,e)=>s+(Number(e.amount)||0),0);
}
function resteTotal(){ return revenusTotal()-depensesTotal(); }

/* =========================================================
   CALCULS BILAN
========================================================= */
function passifsTotal(){
  return state.bilan.dettes.filter(d=>d.included).reduce((s,d)=>s+(Number(d.amount)||0),0);
}
function actifsTotal(){
  return portfolioTotals().currentValue + (Number(state.bilan.autresActifs)||0);
}
function valeurNette(){ return actifsTotal()-passifsTotal(); }

/* =========================================================
   CALCULS MARGE
========================================================= */
function marginByYear(){
  const byYear = {};
  state.margin.forEach(m=>{
    const y = (m.date||'').slice(0,4)||'—';
    byYear[y] = byYear[y] || {cad:0, usd:0};
    byYear[y].cad += Number(m.cad)||0;
    byYear[y].usd += Number(m.usd)||0;
  });
  return byYear;
}

/* =========================================================
   NAVIGATION
========================================================= */
const TABS = [
  {id:'dashboard', label:'📊 Tableau de bord'},
  {id:'portfolio', label:'💼 Portefeuille'},
  {id:'dividendes', label:'💵 Dividendes'},
  {id:'budget', label:'🧾 Budget mensuel'},
  {id:'bilan', label:'🏦 Bilan / Valeur nette'},
  {id:'projection', label:'🚀 Projection 2030'},
  {id:'marge', label:'📈 Intérêt sur marge'},
];
let activeTab = 'dashboard';
let chartInstance = null;

function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = TABS.map(t=>`<button data-tab="${t.id}" class="${t.id===activeTab?'active':''}">${t.label}</button>`).join('');
  nav.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    activeTab = b.dataset.tab;
    renderNav();
    renderTabs();
  }));
}

/* =========================================================
   RENDU PRINCIPAL
========================================================= */
function renderTabs(){
  const root = document.getElementById('tabs');
  root.innerHTML = TABS.map(t=>`<div class="tab ${t.id===activeTab?'active':''}" id="tab-${t.id}"></div>`).join('');
  renderDashboard();
  renderPortfolio();
  renderDividendes();
  renderBudget();
  renderBilan();
  renderProjection();
  renderMarge();
}

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  const el = document.getElementById('tab-dashboard');
  const pt = portfolioTotals();
  const vn = valeurNette();
  const reste = resteTotal();
  el.innerHTML = `
    <h1>Tableau de bord</h1>
    <div class="subtitle">Vue d'ensemble des finances familiales — mis à jour automatiquement</div>
    <div class="cards">
      <div class="card"><div class="label">Valeur du portefeuille</div><div class="value">${fmtCAD(pt.currentValue)}</div><div class="sub">Investi: ${fmtCAD(pt.totalInvested)}</div></div>
      <div class="card"><div class="label">Gain / perte</div><div class="value ${pt.profit>=0?'pos':'neg'}">${fmtCAD(pt.profit)}</div><div class="sub ${pt.totalReturn>=0?'pos':'neg'}">${fmtPct(pt.totalReturn)}</div></div>
      <div class="card"><div class="label">Valeur nette (bilan)</div><div class="value">${fmtCAD(vn)}</div><div class="sub">Actifs ${fmtCAD(actifsTotal())} − Passifs ${fmtCAD(passifsTotal())}</div></div>
      <div class="card"><div class="label">Reste mensuel (budget)</div><div class="value ${reste>=0?'pos':'neg'}">${fmtCAD(reste)}</div><div class="sub">Revenus ${fmtCAD(revenusTotal())} − Dépenses ${fmtCAD(depensesTotal())}</div></div>
      <div class="card"><div class="label">Revenu de dividendes / an</div><div class="value">${fmtCAD(pt.annualIncome)}</div><div class="sub">≈ ${fmtCAD(pt.monthlyIncome)} / mois</div></div>
    </div>
    <div class="grid2">
      <div class="panel">
        <h2>Répartition du portefeuille</h2>
        <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
      </div>
      <div class="panel">
        <h2>Résumé par fonds</h2>
        <table>
          <thead><tr><th>Fonds</th><th class="num">Valeur</th><th class="num">Poids</th><th class="num">Rendement</th></tr></thead>
          <tbody>
            ${allFundAggregates().map(f=>`
              <tr>
                <td>${f.symbol}</td>
                <td class="num computed">${fmtCAD(f.currentValue)}</td>
                <td class="num computed">${fmtPct(pt.currentValue? f.currentValue/pt.currentValue:0)}</td>
                <td class="num computed ${f.totalReturn>=0?'pos':'neg'}">${fmtPct(f.totalReturn)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  drawPieChart();
}
function drawPieChart(){
  const canvas = document.getElementById('pieChart');
  if(!canvas || typeof Chart==='undefined') return;
  const aggs = allFundAggregates();
  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(canvas, {
    type:'doughnut',
    data:{
      labels: aggs.map(f=>f.symbol),
      datasets:[{
        data: aggs.map(f=>f.currentValue),
        backgroundColor:['#3ea6ff','#2ecc8f','#ffb454','#ff5d6c','#a78bfa','#f472b6'],
        borderColor:'#111a2e', borderWidth:2,
      }]
    },
    options:{
      plugins:{ legend:{ position:'bottom', labels:{color:'#e7ecf7', font:{size:11.5}} } },
      cutout:'62%',
    }
  });
}

/* ---------- PORTFOLIO ---------- */
function renderPortfolio(){
  const el = document.getElementById('tab-portfolio');
  el.innerHTML = `
    <h1>Portefeuille</h1>
    <div class="subtitle">Positions par compte, agrégées automatiquement par fonds</div>

    <div class="panel">
      <h2>Fonds suivis <span class="actions"><button class="btn small" id="btnAddFund">+ Ajouter un fonds</button></span></h2>
      <div class="subtitle" style="margin-bottom:10px;">Le prix actuel (<span class="pill auto">auto</span>) est mis à jour automatiquement toutes les 30 minutes par une action GitHub — tu n'as rien à faire. Le champ « symbole source » indique quel titre est suivi (modifiable).</div>
      <table>
        <thead><tr><th>Symbole</th><th>Nom</th><th>Symbole source</th><th class="num">Prix actuel</th><th class="num">Dividende annuel/action</th><th class="num">Sommet historique</th><th></th></tr></thead>
        <tbody id="fundsMetaBody"></tbody>
      </table>
    </div>

    <div class="panel">
      <h2>Résumé du portefeuille</h2>
      <table>
        <thead><tr>
          <th>Fonds</th><th class="num">Actions</th><th class="num">Prix moyen</th><th class="num">Prix actuel</th>
          <th class="num">Investi</th><th class="num">Valeur</th><th class="num">Poids</th>
          <th class="num">Revenu annuel</th><th class="num">Revenu mensuel</th><th class="num">Gain/perte</th><th class="num">Rendement</th><th class="num">Valeur au sommet</th>
        </tr></thead>
        <tbody id="fundSummaryBody"></tbody>
        <tfoot>
          <tr class="total-row">
            <td>Total</td><td></td><td></td><td></td>
            <td class="num" id="sumInvested"></td>
            <td class="num" id="sumValue"></td>
            <td class="num">100 %</td>
            <td class="num" id="sumIncomeA"></td>
            <td class="num" id="sumIncomeM"></td>
            <td class="num" id="sumProfit"></td>
            <td class="num" id="sumReturn"></td>
            <td class="num"></td>
          </tr>
        </tfoot>
      </table>
    </div>

    <div class="panel">
      <h2>Positions par compte <span class="actions"><button class="btn small" id="btnAddPos">+ Ajouter une position</button></span></h2>
      <table>
        <thead><tr><th>Fonds</th><th>Compte</th><th class="num">Actions</th><th class="num">Prix moyen</th><th class="num">Coût</th><th class="num">Valeur actuelle</th><th></th></tr></thead>
        <tbody id="positionsBody"></tbody>
      </table>
    </div>
  `;

  function fmtLastUpdated(iso){
    if(!iso) return '<span class="muted">jamais</span>';
    const d = new Date(iso);
    return d.toLocaleString('fr-CA',{dateStyle:'short', timeStyle:'short'});
  }

  const fmBody = document.getElementById('fundsMetaBody');
  function renderFundsMeta(){
    fmBody.innerHTML = state.fundOrder.map(sym=>{
      const f = state.funds[sym];
      return `<tr data-sym="${sym}">
        <td><strong>${sym}</strong></td>
        <td><input type="text" data-field="name" value="${f.name||''}"></td>
        <td><input type="text" data-field="source" placeholder="ex: VFV.TO" value="${f.source||''}"></td>
        <td class="num">
          <div>${fmtCAD(f.priceNow)} <span class="pill auto">auto</span></div>
          <div class="muted" style="font-size:10.5px;margin-top:2px;">MAJ: ${fmtLastUpdated(f.lastUpdated)}</div>
        </td>
        <td class="num"><input type="number" step="0.01" data-field="annualDividend" value="${f.annualDividend}"></td>
        <td class="num"><input type="number" step="0.01" data-field="priceATH" value="${f.priceATH}"></td>
        <td class="row-actions"><button class="btn small danger" data-del="${sym}">Suppr.</button></td>
      </tr>`;
    }).join('');
    fmBody.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('input', e=>{
        const sym = e.target.closest('tr').dataset.sym;
        const field = e.target.dataset.field;
        const val = (field==='name'||field==='source') ? e.target.value : parseFloat(e.target.value)||0;
        state.funds[sym][field] = val;
        save();
        refreshPortfolioComputed();
      });
    });
    fmBody.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', e=>{
      const sym = e.target.dataset.del;
      if(state.positions.some(p=>p.symbol===sym)){
        alert('Supprimez d’abord les positions associées à ce fonds.'); return;
      }
      delete state.funds[sym];
      state.fundOrder = state.fundOrder.filter(s=>s!==sym);
      save(); renderPortfolio();
    }));
  }
  renderFundsMeta();
  document.getElementById('btnAddFund').addEventListener('click',()=>{
    const sym = (prompt('Symbole du nouveau fonds (ex: XEQT)')||'').trim().toUpperCase();
    if(!sym) return;
    if(state.funds[sym]){ alert('Ce symbole existe déjà.'); return; }
    state.funds[sym] = {name:'', priceNow:0, annualDividend:0, priceATH:0, source:'', lastUpdated:null};
    state.fundOrder.push(sym);
    save(); renderPortfolio();
  });

  function renderFundSummary(){
    const aggs = allFundAggregates();
    const pt = portfolioTotals();
    document.getElementById('fundSummaryBody').innerHTML = aggs.map(f=>`
      <tr>
        <td><strong>${f.symbol}</strong><br><span class="muted" style="font-size:11px">${f.name||''}</span></td>
        <td class="num">${fmtNum(f.shares)}</td>
        <td class="num">${fmtCAD(f.bookPriceAvg)}</td>
        <td class="num">${fmtCAD(f.priceNow)}</td>
        <td class="num">${fmtCAD(f.bookTotal)}</td>
        <td class="num">${fmtCAD(f.currentValue)}</td>
        <td class="num">${fmtPct(pt.currentValue? f.currentValue/pt.currentValue:0)}</td>
        <td class="num">${fmtCAD(f.annualIncome)}</td>
        <td class="num">${fmtCAD(f.monthlyIncome)}</td>
        <td class="num ${f.profit>=0?'pos':'neg'}">${fmtCAD(f.profit)}</td>
        <td class="num ${f.totalReturn>=0?'pos':'neg'}">${fmtPct(f.totalReturn)}</td>
        <td class="num">${fmtCAD(f.athValue)}</td>
      </tr>`).join('');
    document.getElementById('sumInvested').textContent = fmtCAD(pt.totalInvested);
    document.getElementById('sumValue').textContent = fmtCAD(pt.currentValue);
    document.getElementById('sumIncomeA').textContent = fmtCAD(pt.annualIncome);
    document.getElementById('sumIncomeM').textContent = fmtCAD(pt.monthlyIncome);
    document.getElementById('sumProfit').textContent = fmtCAD(pt.profit);
    document.getElementById('sumProfit').className = 'num '+(pt.profit>=0?'pos':'neg');
    document.getElementById('sumReturn').textContent = fmtPct(pt.totalReturn);
    document.getElementById('sumReturn').className = 'num '+(pt.totalReturn>=0?'pos':'neg');
  }
  renderFundSummary();

  const posBody = document.getElementById('positionsBody');
  function fundOptions(sel){
    return state.fundOrder.map(s=>`<option value="${s}" ${s===sel?'selected':''}>${s}</option>`).join('');
  }
  function renderPositions(){
    posBody.innerHTML = state.positions.map(p=>{
      const cost = (Number(p.shares)||0)*(Number(p.bookPrice)||0);
      const priceNow = Number(state.funds[p.symbol]?.priceNow)||0;
      const val = (Number(p.shares)||0)*priceNow;
      return `<tr data-id="${p.id}">
        <td><select data-field="symbol">${fundOptions(p.symbol)}</select></td>
        <td><input type="text" data-field="account" value="${p.account||''}"></td>
        <td class="num"><input type="number" step="0.01" data-field="shares" value="${p.shares}"></td>
        <td class="num"><input type="number" step="0.01" data-field="bookPrice" value="${p.bookPrice}"></td>
        <td class="num computed" data-computed="cost">${fmtCAD(cost)}</td>
        <td class="num computed" data-computed="val">${fmtCAD(val)}</td>
        <td class="row-actions"><button class="btn small danger" data-del="${p.id}">Suppr.</button></td>
      </tr>`;
    }).join('');
    posBody.querySelectorAll('tr').forEach(tr=>{
      tr.querySelectorAll('[data-field]').forEach(inp=>{
        inp.addEventListener('input', e=>{
          const id = tr.dataset.id;
          const item = state.positions.find(p=>p.id===id);
          const field = e.target.dataset.field;
          item[field] = (field==='shares'||field==='bookPrice') ? (parseFloat(e.target.value)||0) : e.target.value;
          save();
          const cost = (Number(item.shares)||0)*(Number(item.bookPrice)||0);
          const priceNow = Number(state.funds[item.symbol]?.priceNow)||0;
          const val = (Number(item.shares)||0)*priceNow;
          tr.querySelector('[data-computed=cost]').textContent = fmtCAD(cost);
          tr.querySelector('[data-computed=val]').textContent = fmtCAD(val);
          refreshPortfolioComputed();
        });
      });
      tr.querySelector('[data-del]').addEventListener('click', ()=>{
        state.positions = state.positions.filter(p=>p.id!==tr.dataset.id);
        save(); renderPortfolio();
      });
    });
  }
  renderPositions();
  document.getElementById('btnAddPos').addEventListener('click', ()=>{
    state.positions.push({id:uid(), symbol:state.fundOrder[0]||'', account:'Nouveau compte', shares:0, bookPrice:0});
    save(); renderPortfolio();
  });

  function refreshPortfolioComputed(){
    renderFundSummary();
  }
}

function renderDividendes(){
  const el = document.getElementById('tab-dividendes');
  el.innerHTML = `
    <h1>Dividendes reçus</h1>
    <div class="subtitle">Historique des versements réels, par fonds</div>
    <div class="panel">
      <h2>Journal des dividendes <span class="actions"><button class="btn small" id="btnAddDiv">+ Ajouter</button></span></h2>
      <table>
        <thead><tr><th>Fonds</th><th>Date</th><th class="num">Montant</th><th></th></tr></thead>
        <tbody id="divBody"></tbody>
        <tfoot><tr class="total-row"><td colspan="2">Total</td><td class="num" id="divTotal"></td><td></td></tr></tfoot>
      </table>
    </div>
    <div class="panel">
      <h2>Total par fonds</h2>
      <table>
        <thead><tr><th>Fonds</th><th class="num">Total reçu</th></tr></thead>
        <tbody id="divByFund"></tbody>
      </table>
    </div>
  `;
  function fundOptions(sel){
    return state.fundOrder.map(s=>`<option value="${s}" ${s===sel?'selected':''}>${s}</option>`).join('');
  }
  function render(){
    const body = document.getElementById('divBody');
    body.innerHTML = state.dividends.map(d=>`
      <tr data-id="${d.id}">
        <td><select data-field="symbol">${fundOptions(d.symbol)}</select></td>
        <td><input type="date" data-field="date" value="${d.date||''}"></td>
        <td class="num"><input type="number" step="0.01" data-field="amount" value="${d.amount}"></td>
        <td class="row-actions"><button class="btn small danger" data-del="${d.id}">Suppr.</button></td>
      </tr>`).join('');
    body.querySelectorAll('tr').forEach(tr=>{
      tr.querySelectorAll('[data-field]').forEach(inp=>{
        inp.addEventListener('input', e=>{
          const item = state.dividends.find(d=>d.id===tr.dataset.id);
          const field = e.target.dataset.field;
          item[field] = field==='amount' ? (parseFloat(e.target.value)||0) : e.target.value;
          save();
          recomputeDiv();
        });
      });
      tr.querySelector('[data-del]').addEventListener('click', ()=>{
        state.dividends = state.dividends.filter(d=>d.id!==tr.dataset.id);
        save(); renderDividendes();
      });
    });
  }
  function recomputeDiv(){
    const total = state.dividends.reduce((s,d)=>s+(Number(d.amount)||0),0);
    document.getElementById('divTotal').textContent = fmtCAD(total);
    const byFund = {};
    state.dividends.forEach(d=>{ byFund[d.symbol] = (byFund[d.symbol]||0)+(Number(d.amount)||0); });
    document.getElementById('divByFund').innerHTML = Object.keys(byFund).map(sym=>
      `<tr><td>${sym}</td><td class="num">${fmtCAD(byFund[sym])}</td></tr>`).join('') || '<tr><td class="muted">Aucun dividende enregistré</td></tr>';
  }
  render();
  recomputeDiv();
  document.getElementById('btnAddDiv').addEventListener('click', ()=>{
    state.dividends.push({id:uid(), symbol:state.fundOrder[0]||'', date:new Date().toISOString().slice(0,10), amount:0});
    save(); renderDividendes();
  });
}

/* ---------- BUDGET ---------- */
function renderBudget(){
  const el = document.getElementById('tab-budget');
  el.innerHTML = `
    <h1>Budget mensuel</h1>
    <div class="subtitle">Revenus, dépenses, épargnes et droits de cotisation</div>

    <div class="cards">
      <div class="card"><div class="label">Revenus totaux</div><div class="value pos" id="cardRevenus"></div></div>
      <div class="card"><div class="label">Dépenses totales</div><div class="value neg" id="cardDepenses"></div></div>
      <div class="card"><div class="label">Reste (loisirs, vêtements, invest., voyage)</div><div class="value" id="cardReste"></div></div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h2>Revenus <span class="actions"><button class="btn small" id="btnAddRev">+ Ajouter</button></span></h2>
        <table>
          <thead><tr><th>Source</th><th>Type</th><th class="num">Montant</th><th></th></tr></thead>
          <tbody id="revBody"></tbody>
          <tfoot><tr class="total-row"><td colspan="2">Total (revenus − déductions)</td><td class="num" id="revTotal"></td><td></td></tr></tfoot>
        </table>
      </div>
      <div class="panel">
        <h2>Dépenses <span class="actions"><button class="btn small" id="btnAddDep">+ Catégorie</button></span></h2>
        <table>
          <thead><tr><th>Catégorie</th><th class="num">Montant</th><th></th></tr></thead>
          <tbody id="depBody"></tbody>
          <tfoot><tr class="total-row"><td>Total</td><td class="num" id="depTotal"></td><td></td></tr></tfoot>
        </table>
      </div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h2>Épargnes / comptes disponibles <span class="actions"><button class="btn small" id="btnAddEpa">+ Ajouter</button></span></h2>
        <table>
          <thead><tr><th>Compte</th><th class="num">Montant</th><th></th></tr></thead>
          <tbody id="epaBody"></tbody>
          <tfoot><tr class="total-row"><td>Total</td><td class="num" id="epaTotal"></td><td></td></tr></tfoot>
        </table>
      </div>
      <div class="panel">
        <h2>Droits de cotisation <span class="actions"><button class="btn small" id="btnAddCot">+ Ajouter</button></span></h2>
        <table>
          <thead><tr><th>Compte</th><th class="num">Droit disponible</th><th class="num">Individuel</th><th class="num">Conjoint</th><th></th></tr></thead>
          <tbody id="cotBody"></tbody>
        </table>
      </div>
    </div>
  `;

  const revTypeOptions = sel => ['income','deduction','excluded'].map(t=>
    `<option value="${t}" ${t===sel?'selected':''}>${t==='income'?'Revenu':t==='deduction'?'Déduction':'Exclu du total'}</option>`).join('');

  function renderRev(){
    document.getElementById('revBody').innerHTML = state.budget.revenus.map(r=>`
      <tr data-id="${r.id}">
        <td><input type="text" data-field="label" value="${r.label||''}"></td>
        <td><select data-field="type">${revTypeOptions(r.type)}</select></td>
        <td class="num"><input type="number" step="0.01" data-field="amount" value="${r.amount}"></td>
        <td class="row-actions"><button class="btn small danger" data-del="${r.id}">Suppr.</button></td>
      </tr>`).join('');
    document.getElementById('revBody').querySelectorAll('tr').forEach(tr=>{
      tr.querySelectorAll('[data-field]').forEach(inp=>{
        inp.addEventListener('input', e=>{
          const item = state.budget.revenus.find(r=>r.id===tr.dataset.id);
          const field = e.target.dataset.field;
          item[field] = field==='amount' ? (parseFloat(e.target.value)||0) : e.target.value;
          save(); recomputeBudget();
        });
      });
      tr.querySelector('[data-del]').addEventListener('click', ()=>{
        state.budget.revenus = state.budget.revenus.filter(r=>r.id!==tr.dataset.id);
        save(); renderBudget();
      });
    });
  }
  document.getElementById('btnAddRev').addEventListener('click', ()=>{
    state.budget.revenus.push({id:uid(), label:'Nouveau revenu', amount:0, type:'income'});
    save(); renderBudget();
  });

  function depRowHTML(c){
    const hasSubs = c.subs && c.subs.length;
    return `<tr data-id="${c.id}" class="${c.excluded?'muted':''}">
      <td>
        <input type="text" data-field="label" value="${c.label||''}">
      </td>
      <td class="num">${hasSubs ? `<span class="computed" data-computed="amount">${fmtCAD(depenseCategorieTotal(c))}</span>` : `<input type="number" step="0.01" data-field="amount" value="${c.amount}">`}</td>
      <td class="row-actions">
        <label style="font-size:11px;color:var(--muted);white-space:nowrap;"><input type="checkbox" class="checkbox" data-field="excluded" ${c.excluded?'checked':''}> exclure</label>
        <button class="btn small" data-addsub="${c.id}">+sous-item</button>
        <button class="btn small danger" data-del="${c.id}">Suppr.</button>
      </td>
    </tr>
    ${(c.subs||[]).map(s=>`
      <tr class="sub-row" data-id="${c.id}" data-subid="${s.id}">
        <td><input type="text" data-subfield="label" value="${s.label||''}"></td>
        <td class="num"><input type="number" step="0.01" data-subfield="amount" value="${s.amount}"></td>
        <td class="row-actions"><button class="btn small danger" data-delsub="${s.id}">×</button></td>
      </tr>`).join('')}`;
  }
  function renderDep(){
    document.getElementById('depBody').innerHTML = state.budget.depenses.map(depRowHTML).join('');
    const body = document.getElementById('depBody');
    body.querySelectorAll('tr[data-id]').forEach(tr=>{
      const catId = tr.dataset.id;
      const cat = state.budget.depenses.find(c=>c.id===catId);
      tr.querySelectorAll('[data-field]').forEach(inp=>{
        inp.addEventListener(inp.type==='checkbox'?'change':'input', e=>{
          const field = e.target.dataset.field;
          cat[field] = field==='amount' ? (parseFloat(e.target.value)||0) : (field==='excluded'? e.target.checked : e.target.value);
          save(); recomputeBudget();
        });
      });
      tr.querySelectorAll('[data-subfield]').forEach(inp=>{
        inp.addEventListener('input', e=>{
          const sub = cat.subs.find(s=>s.id===tr.dataset.subid);
          const field = e.target.dataset.subfield;
          sub[field] = field==='amount' ? (parseFloat(e.target.value)||0) : e.target.value;
          save();
          const catRow = body.querySelector(`tr[data-id="${catId}"]:not(.sub-row) [data-computed=amount]`);
          if(catRow) catRow.textContent = fmtCAD(depenseCategorieTotal(cat));
          recomputeBudget();
        });
      });
      const delBtn = tr.querySelector('[data-del]');
      if(delBtn) delBtn.addEventListener('click', ()=>{
        state.budget.depenses = state.budget.depenses.filter(c=>c.id!==catId);
        save(); renderBudget();
      });
      const addSubBtn = tr.querySelector('[data-addsub]');
      if(addSubBtn) addSubBtn.addEventListener('click', ()=>{
        cat.subs = cat.subs||[];
        cat.subs.push({id:uid(), label:'Sous-catégorie', amount:0});
        cat.amount = null;
        save(); renderBudget();
      });
      const delSubBtn = tr.querySelector('[data-delsub]');
      if(delSubBtn) delSubBtn.addEventListener('click', ()=>{
        cat.subs = cat.subs.filter(s=>s.id!==tr.dataset.subid);
        if(!cat.subs.length) cat.amount = 0;
        save(); renderBudget();
      });
    });
  }
  document.getElementById('btnAddDep').addEventListener('click', ()=>{
    state.budget.depenses.push({id:uid(), label:'Nouvelle catégorie', amount:0, subs:[], excluded:false});
    save(); renderBudget();
  });

  function renderEpa(){
    document.getElementById('epaBody').innerHTML = state.budget.epargnes.map(e=>`
      <tr data-id="${e.id}">
        <td><input type="text" data-field="label" value="${e.label||''}"></td>
        <td class="num"><input type="number" step="0.01" data-field="amount" value="${e.amount}"></td>
        <td class="row-actions"><button class="btn small danger" data-del="${e.id}">Suppr.</button></td>
      </tr>`).join('');
    document.getElementById('epaBody').querySelectorAll('tr').forEach(tr=>{
      tr.querySelectorAll('[data-field]').forEach(inp=>{
        inp.addEventListener('input', ev=>{
          const item = state.budget.epargnes.find(e=>e.id===tr.dataset.id);
          const field = ev.target.dataset.field;
          item[field] = field==='amount' ? (parseFloat(ev.target.value)||0) : ev.target.value;
          save(); recomputeBudget();
        });
      });
      tr.querySelector('[data-del]').addEventListener('click', ()=>{
        state.budget.epargnes = state.budget.epargnes.filter(e=>e.id!==tr.dataset.id);
        save(); renderBudget();
      });
    });
  }
  document.getElementById('btnAddEpa').addEventListener('click', ()=>{
    state.budget.epargnes.push({id:uid(), label:'Nouveau compte', amount:0});
    save(); renderBudget();
  });

  function renderCot(){
    document.getElementById('cotBody').innerHTML = state.budget.cotisations.map(c=>`
      <tr data-id="${c.id}">
        <td><input type="text" data-field="label" value="${c.label||''}"></td>
        <td class="num"><input type="number" step="0.01" data-field="droit" value="${c.droit}"></td>
        <td class="num"><input type="number" step="0.01" data-field="individuel" value="${c.individuel??''}"></td>
        <td class="num"><input type="number" step="0.01" data-field="conjoint" value="${c.conjoint??''}"></td>
        <td class="row-actions"><button class="btn small danger" data-del="${c.id}">Suppr.</button></td>
      </tr>`).join('');
    document.getElementById('cotBody').querySelectorAll('tr').forEach(tr=>{
      tr.querySelectorAll('[data-field]').forEach(inp=>{
        inp.addEventListener('input', ev=>{
          const item = state.budget.cotisations.find(c=>c.id===tr.dataset.id);
          const field = ev.target.dataset.field;
          item[field] = field==='label' ? ev.target.value : (parseFloat(ev.target.value)||null);
          save();
        });
      });
      tr.querySelector('[data-del]').addEventListener('click', ()=>{
        state.budget.cotisations = state.budget.cotisations.filter(c=>c.id!==tr.dataset.id);
        save(); renderBudget();
      });
    });
  }
  document.getElementById('btnAddCot').addEventListener('click', ()=>{
    state.budget.cotisations.push({id:uid(), label:'Nouveau compte', droit:0, individuel:null, conjoint:null});
    save(); renderBudget();
  });

  function recomputeBudget(){
    document.getElementById('cardRevenus').textContent = fmtCAD(revenusTotal());
    document.getElementById('cardDepenses').textContent = fmtCAD(depensesTotal());
    const reste = resteTotal();
    const resteCard = document.getElementById('cardReste');
    resteCard.textContent = fmtCAD(reste);
    resteCard.className = 'value '+(reste>=0?'pos':'neg');
    document.getElementById('revTotal').textContent = fmtCAD(revenusTotal());
    document.getElementById('depTotal').textContent = fmtCAD(depensesTotal());
    document.getElementById('epaTotal').textContent = fmtCAD(epargnesTotal());
  }

  renderRev(); renderDep(); renderEpa(); renderCot();
  recomputeBudget();
}

      tr.querySelector('[data-del]').addEventListener('click', ()=>{
        state.bilan.dettes = state.bilan.dettes.filter(d=>d.id!==tr.dataset.id);
        save(); renderBilan();
      });
    });
  }
  document.getElementById('btnAddDette').addEventListener('click', ()=>{
    state.bilan.dettes.push({id:uid(), label:'Nouvelle dette', amount:0, included:true});
    save(); renderBilan();
  });
  function recomputeBilan(){
    document.getElementById('cardActifs').textContent = fmtCAD(actifsTotal());
    document.getElementById('cardPassifs').textContent = fmtCAD(passifsTotal());
    document.getElementById('cardValeurNette').textContent = fmtCAD(valeurNette());
    document.getElementById('dettesTotal').textContent = fmtCAD(passifsTotal());
  }
  render();
  recomputeBilan();
}

/* ---------- PROJECTION 2030 ---------- */
function renderProjection(){
  const el = document.getElementById('tab-projection');
  el.innerHTML = `
    <h1>Projection 2030</h1>
    <div class="subtitle">Scénario cible : nombre d'actions et prix visés par fonds (prix moyen actuel utilisé comme coût de base)</div>
    <div class="panel">
      <h2>Scénario <span class="actions"><button class="btn small" id="btnAddProj">+ Ajouter un fonds</button></span></h2>
      <table>
        <thead><tr>
          <th>Fonds</th><th class="num">Actions visées</th><th class="num">Prix moyen actuel</th><th class="num">Prix visé</th>
          <th class="num">Investi (coût)</th><th class="num">Valeur visée</th><th class="num">Poids</th><th class="num">Gain/perte</th><th class="num">Rendement</th><th></th>
        </tr></thead>
        <tbody id="projBody"></tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="4">Total</td>
            <td class="num" id="projInvested"></td>
            <td class="num" id="projValue"></td>
            <td class="num">100 %</td>
            <td class="num" id="projProfit"></td>
            <td class="num" id="projReturn"></td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
  function fundOptions(sel){
    return state.fundOrder.map(s=>`<option value="${s}" ${s===sel?'selected':''}>${s}</option>`).join('');
  }
  function computeRow(p){
    const bookPriceAvg = fundAggregate(p.symbol).bookPriceAvg;
    const invested = (Number(p.targetShares)||0)*bookPriceAvg;
    const value = (Number(p.targetShares)||0)*(Number(p.targetPrice)||0);
    const profit = value-invested;
    const ret = invested? profit/invested : 0;
    return {bookPriceAvg, invested, value, profit, ret};
  }
  function fullRender(){
    const rows = state.projection2030.map(p=>({p, c:computeRow(p)}));
    const totalValue = rows.reduce((s,r)=>s+r.c.value,0);
    document.getElementById('projBody').innerHTML = rows.map(({p,c})=>`
      <tr data-id="${p.id}">
        <td><select data-field="symbol">${fundOptions(p.symbol)}</select></td>
        <td class="num"><input type="number" step="0.01" data-field="targetShares" value="${p.targetShares}"></td>
        <td class="num computed">${fmtCAD(c.bookPriceAvg)}</td>
        <td class="num"><input type="number" step="0.01" data-field="targetPrice" value="${p.targetPrice}"></td>
        <td class="num computed" data-computed="invested">${fmtCAD(c.invested)}</td>
        <td class="num computed" data-computed="value">${fmtCAD(c.value)}</td>
        <td class="num computed" data-computed="weight">${fmtPct(totalValue? c.value/totalValue:0)}</td>
        <td class="num computed ${c.profit>=0?'pos':'neg'}" data-computed="profit">${fmtCAD(c.profit)}</td>
        <td class="num computed ${c.ret>=0?'pos':'neg'}" data-computed="ret">${fmtPct(c.ret)}</td>
        <td class="row-actions"><button class="btn small danger" data-del="${p.id}">Suppr.</button></td>
      </tr>`).join('');
    attachHandlers();
    updateTotals();
  }
  function updateTotals(){
    const rows = state.projection2030.map(p=>({p, c:computeRow(p)}));
    const invested = rows.reduce((s,r)=>s+r.c.invested,0);
    const value = rows.reduce((s,r)=>s+r.c.value,0);
    const profit = value-invested;
    const ret = invested? profit/invested:0;
    document.getElementById('projInvested').textContent = fmtCAD(invested);
    document.getElementById('projValue').textContent = fmtCAD(value);
    document.getElementById('projProfit').textContent = fmtCAD(profit);
    document.getElementById('projProfit').className = 'num '+(profit>=0?'pos':'neg');
    document.getElementById('projReturn').textContent = fmtPct(ret);
    document.getElementById('projReturn').className = 'num '+(ret>=0?'pos':'neg');
    rows.forEach(({p,c})=>{
      const tr = document.querySelector(`#projBody tr[data-id="${p.id}"]`);
      if(!tr) return;
      tr.querySelector('[data-computed=invested]').textContent = fmtCAD(c.invested);
      tr.querySelector('[data-computed=value]').textContent = fmtCAD(c.value);
      tr.querySelector('[data-computed=weight]').textContent = fmtPct(value? c.value/value:0);
      const profitCell = tr.querySelector('[data-computed=profit]');
      profitCell.textContent = fmtCAD(c.profit); profitCell.className = 'num computed '+(c.profit>=0?'pos':'neg');
      const retCell = tr.querySelector('[data-computed=ret]');
      retCell.textContent = fmtPct(c.ret); retCell.className = 'num computed '+(c.ret>=0?'pos':'neg');
    });
  }
  function attachHandlers(){
    document.getElementById('projBody').querySelectorAll('tr').forEach(tr=>{
      tr.querySelectorAll('[data-field]').forEach(inp=>{
        inp.addEventListener('input', e=>{
          const item = state.projection2030.find(p=>p.id===tr.dataset.id);
          const field = e.target.dataset.field;
          item[field] = field==='symbol' ? e.target.value : (parseFloat(e.target.value)||0);
          save();
          if(field==='symbol'){ fullRender(); } else { updateTotals(); }
        });
      });
      tr.querySelector('[data-del]').addEventListener('click', ()=>{
        state.projection2030 = state.projection2030.filter(p=>p.id!==tr.dataset.id);
        save(); fullRender();
      });
    });
  }
  fullRender();
  document.getElementById('btnAddProj').addEventListener('click', ()=>{
    state.projection2030.push({id:uid(), symbol:state.fundOrder[0]||'', targetShares:0, targetPrice:0});
    save(); fullRender();
  });
}

/* ---------- MARGE ---------- */
function renderMarge(){
  const el = document.getElementById('tab-marge');
  el.innerHTML = `
    <h1>Intérêt sur marge</h1>
    <div class="subtitle">Suivi mensuel des intérêts payés (CAD et USD)</div>
    <div class="panel">
      <h2>Historique <span class="actions"><button class="btn small" id="btnAddMarge">+ Ajouter</button></span></h2>
      <table>
        <thead><tr><th>Date</th><th class="num">Montant CAD</th><th class="num">Montant USD</th><th></th></tr></thead>
        <tbody id="margeBody"></tbody>
      </table>
    </div>
    <div class="panel">
      <h2>Totaux par année</h2>
      <table id="margeYearTable"><thead><tr><th>Année</th><th class="num">Total CAD</th><th class="num">Total USD</th></tr></thead><tbody id="margeYearBody"></tbody></table>
    </div>
  `;
  function render(){
    const sorted = [...state.margin].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    document.getElementById('margeBody').innerHTML = sorted.map(m=>`
      <tr data-id="${m.id}">
        <td><input type="date" data-field="date" value="${m.date||''}"></td>
        <td class="num"><input type="number" step="0.01" data-field="cad" value="${m.cad??''}"></td>
        <td class="num"><input type="number" step="0.01" data-field="usd" value="${m.usd??''}"></td>
        <td class="row-actions"><button class="btn small danger" data-del="${m.id}">Suppr.</button></td>
      </tr>`).join('');
    document.getElementById('margeBody').querySelectorAll('tr').forEach(tr=>{
      tr.querySelectorAll('[data-field]').forEach(inp=>{
        inp.addEventListener('input', e=>{
          const item = state.margin.find(m=>m.id===tr.dataset.id);
          const field = e.target.dataset.field;
          item[field] = field==='date' ? e.target.value : (parseFloat(e.target.value)||null);
          save(); recomputeYears();
        });
      });
      tr.querySelector('[data-del]').addEventListener('click', ()=>{
        state.margin = state.margin.filter(m=>m.id!==tr.dataset.id);
        save(); renderMarge();
      });
    });
  }
  function recomputeYears(){
    const byYear = marginByYear();
    const years = Object.keys(byYear).sort();
    document.getElementById('margeYearBody').innerHTML = years.map(y=>
      `<tr><td>${y}</td><td class="num">${fmtCAD(byYear[y].cad)}</td><td class="num">${fmtNum(byYear[y].usd)} $ US</td></tr>`).join('');
  }
  render();
  recomputeYears();
  document.getElementById('btnAddMarge').addEventListener('click', ()=>{
    state.margin.push({id:uid(), date:new Date().toISOString().slice(0,10), cad:0, usd:null});
    save(); renderMarge();
  });
}

/* =========================================================
   SECTION GITHUB (barre latérale)
========================================================= */
function setSyncStatus(mode, text){
  const dot = {connected:'🟢', pending:'🟡', saving:'🟡', error:'🔴', disconnected:'⚪'}[mode] || '⚪';
  const label = document.getElementById('ghStatusLabel');
  if(label) label.innerHTML = `${dot} ${text}`;
}
function renderGitHubSection(){
  const el = document.getElementById('githubSection');
  const configured = !!(gh.owner && gh.repo && gh.token);
  el.innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">🔗 Connexion GitHub</div>
    <div id="ghStatusLabel" style="font-size:11px;margin-bottom:8px;">${configured?'⚪ Configuré':'⚪ Non configuré'}</div>
    <label>Utilisateur / organisation</label>
    <input type="text" id="ghOwner" placeholder="ex: farouk77" value="${gh.owner||''}">
    <label>Nom du dépôt</label>
    <input type="text" id="ghRepo" placeholder="ex: portefeuille-famille" value="${gh.repo||''}">
    <label>Branche</label>
    <input type="text" id="ghBranch" placeholder="main" value="${gh.branch||'main'}">
    <label>Jeton d'accès personnel (PAT)</label>
    <input type="password" id="ghToken" placeholder="ghp_..." value="${gh.token||''}">
    <button id="btnGhSave">💾 Enregistrer la connexion</button>
    <button id="btnGhPull">⬇️ Recharger depuis GitHub</button>
  `;
  document.getElementById('btnGhSave').addEventListener('click', async ()=>{
    gh.owner = document.getElementById('ghOwner').value.trim();
    gh.repo = document.getElementById('ghRepo').value.trim();
    gh.branch = document.getElementById('ghBranch').value.trim() || 'main';
    gh.token = document.getElementById('ghToken').value.trim();
    saveGitHubConfig();
    if(gh.owner && gh.repo && gh.token){
      setSyncStatus('pending', 'Test de connexion…');
      try{
        const remote = await pullStateFromGitHub();
        state = remote;
        localStorage.setItem(STORE_KEY, JSON.stringify(state));
        renderTabs();
        setSyncStatus('connected', 'Connecté ✓');
      }catch(e){
        setSyncStatus('error', 'Connexion échouée : '+e.message);
      }
    } else {
      setSyncStatus('disconnected', 'Non configuré');
    }
  });
  document.getElementById('btnGhPull').addEventListener('click', async ()=>{
    if(!(gh.owner && gh.repo && gh.token)){ alert('Configure et enregistre la connexion GitHub d’abord.'); return; }
    setSyncStatus('pending', 'Rechargement…');
    try{
      const remote = await pullStateFromGitHub();
      state = remote;
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      renderTabs();
      setSyncStatus('connected', 'Rechargé ✓');
    }catch(e){
      setSyncStatus('error', 'Erreur : '+e.message);
    }
  });
}

/* =========================================================
   IMPORT / EXPORT / RESET
========================================================= */
document.getElementById('btnExport').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'portefeuille-sauvegarde-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('btnImport').addEventListener('click', ()=>{
  document.getElementById('fileImport').click();
});
document.getElementById('fileImport').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      state = data;
      save();
      renderTabs();
      alert('Importation réussie.');
    }catch(err){ alert('Fichier invalide.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});
document.getElementById('btnReset').addEventListener('click', async ()=>{
  if(confirm('Recharger les données depuis data.json (annule les changements non enregistrés) ?')){
    try{
      const res = await fetch('./data.json', {cache:'no-store'});
      state = await res.json();
      await mergePrices();
      save();
      renderTabs();
    }catch(e){ alert('Impossible de charger data.json : '+e.message); }
  }
});

/* =========================================================
   INIT
========================================================= */
async function mergePrices(){
  try{
    const res = await fetch('./prices.json', {cache:'no-store'});
    if(!res.ok) return;
    const prices = await res.json();
    Object.keys(prices).forEach(sym=>{
      if(state.funds[sym]){
        state.funds[sym].priceNow = prices[sym].price;
        state.funds[sym].lastUpdated = prices[sym].updated;
      }
    });
  }catch(e){ /* pas de connexion : on garde les prix connus */ }
}
async function init(){
  // 1) cache local pour un affichage instantané
  const cached = loadLocalCache();
  if(cached) state = cached;

  renderNav();
  renderTabs();
  renderGitHubSection();

  // 2) données les plus fraîches depuis le dépôt (data.json servi par GitHub Pages)
  try{
    const res = await fetch('./data.json', {cache:'no-store'});
    if(res.ok){
      const fresh = await res.json();
      if(!cached) state = fresh; // si pas de cache local, on prend le fichier tel quel
      else {
        // le cache local peut contenir des modifications plus récentes non confirmées ;
        // par simplicité on privilégie le fichier du dépôt (source de vérité)
        state = fresh;
      }
    }
  }catch(e){ /* hors-ligne ou ouvert en local : on garde le cache/les valeurs par défaut */ }

  // 3) prix à jour
  await mergePrices();

  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  renderTabs();
}
init();
</script>
